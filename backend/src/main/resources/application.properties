spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=8081
server.forward-headers-strategy=framework
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# JWT
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

# Upload
app.storage.upload-dir=${APP_UPLOAD_DIR:uploads}
app.storage.max-upload-bytes=${APP_STORAGE_MAX_UPLOAD_BYTES:5242880}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS and security
app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.security.public-health-enabled=${APP_SECURITY_PUBLIC_HEALTH_ENABLED:true}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.info.env.enabled=true
springdoc.api-docs.enabled=${APP_SECURITY_PUBLIC_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${APP_SECURITY_PUBLIC_DOCS_ENABLED:false}

# SMS
app.sms.chinguisoft.lang=${CHINGUISOFT_LANG:ar}
