spring.datasource.url=jdbc:mysql://localhost:3306/db_backend?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
 
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.security.public-docs-enabled=true
app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.security.rate-limit.login.max-attempts=${APP_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:100}
app.security.rate-limit.login.window-minutes=${APP_RATE_LIMIT_LOGIN_WINDOW_MINUTES:1}
app.security.rate-limit.verification.max-attempts=${APP_RATE_LIMIT_VERIFICATION_MAX_ATTEMPTS:100}
app.security.rate-limit.verification.window-minutes=${APP_RATE_LIMIT_VERIFICATION_WINDOW_MINUTES:1}
app.security.rate-limit.password-reset.max-attempts=${APP_RATE_LIMIT_PASSWORD_RESET_MAX_ATTEMPTS:100}
app.security.rate-limit.password-reset.window-minutes=${APP_RATE_LIMIT_PASSWORD_RESET_WINDOW_MINUTES:1}

app.seed-admin=${APP_SEED_ADMIN:false}
app.seed-admin-phone=${APP_SEED_ADMIN_PHONE:}
app.seed-admin-username=${APP_SEED_ADMIN_USERNAME:}
app.seed-admin-password=${APP_SEED_ADMIN_PASSWORD:}


security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
app.storage.upload-dir=${APP_UPLOAD_DIR:uploads}

