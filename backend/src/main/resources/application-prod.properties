spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:30}
